<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Button Test</title>
<style>
body { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; background:#1a0a5e; font-family:Arial,sans-serif; }
button { font-size:40px; padding:30px 60px; border:none; border-radius:30px; background:#FFD700; color:#333; font-weight:bold; cursor:pointer; margin:20px; }
#result { font-size:32px; color:#FFD700; margin-top:20px; text-align:center; }
</style>
</head>
<body>
  <div id="result">Tap the button 👇</div>
  <button onclick="document.getElementById('result').textContent='✅ JavaScript is working!'">
    👆 Tap Me
  </button>
</body>
</html>
